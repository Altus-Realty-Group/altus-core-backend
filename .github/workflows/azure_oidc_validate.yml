name: azure_oidc_validate

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required Azure OIDC vars
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ vars.AZURE_CLIENT_ID }}"
          test -n "${{ vars.AZURE_TENANT_ID }}"
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}"

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Show Azure context
        shell: bash
        run: az account show
